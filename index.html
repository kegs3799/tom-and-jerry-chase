<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 防止QQ/微信转码 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 核心：QQ抓取卡片元数据（必须放在跳转代码之前） -->
    <meta property="og:title" content="想和你建立情侣关系">
    <meta property="og:description" content="和我成为情侣，让 QQ 帮我们记录每日点滴">
    <meta property="og:image" content="https://ssl.gstatic.com/bt/C3341B7E7A66E3C8E9B1F1C7D8E1F1C7/icon/爱心.png?ne=1">
    <meta property="og:image:secure_url" content="https://ssl.gstatic.com/bt/C3341B7E7A66E3C8E9B1F1C7D8E1F1C7/icon/爱心.png?ne=1">
    
    <!-- 备用meta加强识别 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="想和你建立情侣关系">
    <meta name="twitter:description" content="和我成为情侣，让 QQ 帮我们记录每日点滴">
    <meta name="twitter:image" content="https://ssl.gstatic.com/bt/C3341B7E7A66E3C8E9B1F1C7D8E1F1C7/icon/爱心.png?ne=1">
    
    <title>想和你建立情侣关系</title>
    
    <!-- 隐藏图片供爬虫抓取 -->
    <style>body{display:none;}</style>
</head>
<body>
    <div style="display:none;">
        <img src="https://ssl.gstatic.com/bt/C3341B7E7A66E3C8E9B1F1C7D8E1F1C7/icon/爱心.png?ne=1" alt="heart">
    </div>
    
    <!-- 延迟跳转，给QQ爬虫足够时间抓取meta -->
    <script>
        // 给QQ爬虫留出抓取时间（约1.5秒）
        setTimeout(function() {
            window.location.href = "https://adl.netease.com/d/g/tnj/c/gw";
        }, 1500);
    </script>
</body>
</html>
